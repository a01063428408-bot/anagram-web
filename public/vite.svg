<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="30" fill="#6C5CE7" />

  <!-- 글자 A - 왼쪽 위, 약간 기울어짐 -->
  <text x="12" y="30" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" transform="rotate(-15, 12, 30)">A</text>

  <!-- 글자 b - 오른쪽 위 -->
  <text x="34" y="24" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#FD79A8" transform="rotate(10, 34, 24)">b</text>

  <!-- 글자 가 - 중앙 아래 -->
  <text x="20" y="50" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#FFEAA7" transform="rotate(8, 20, 50)">가</text>

  <!-- 글자 나 - 오른쪽 아래 -->
  <text x="38" y="46" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#55EFC4" transform="rotate(-12, 38, 46)">나</text>

  <!-- 회전 화살표 (글자가 섞이는 느낌) -->
  <path d="M44 14 C50 18, 52 26, 48 32" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="48,32 51,27 45,28" fill="#FFFFFF"/>

  <path d="M20 52 C14 48, 12 40, 16 34" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="16,34 13,39 19,38" fill="#FFFFFF"/>
</svg>
